<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ написал жалобу на УО</title>
<meta property="og:title" content="ИИ написал жалобу на УО вместо жильца">
<meta property="og:description" content="Смотри что получилось 😂">
<meta property="og:image" content="https://catch-the-wave.github.io/KhimkiManagement/og.png">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0f0f0f;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px 40px;
  }

  .badge{
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:20px;
    padding:6px 14px;
    font-size:12px;
    color:#888;
    margin-bottom:20px;
    letter-spacing:.5px;
  }

  .headline{
    font-size:22px;
    font-weight:800;
    text-align:center;
    line-height:1.3;
    margin-bottom:6px;
    max-width:360px;
  }

  .subline{
    font-size:14px;
    color:#666;
    text-align:center;
    margin-bottom:24px;
  }

  .card{
    background:#1a1a1a;
    border:1px solid #2a2a2a;
    border-radius:16px;
    padding:20px;
    max-width:480px;
    width:100%;
    position:relative;
    margin-bottom:20px;
  }

  .quote-mark{
    font-size:48px;
    color:#333;
    line-height:1;
    margin-bottom:-12px;
    font-family:Georgia,serif;
  }

  .complaint-text{
    font-size:15px;
    line-height:1.7;
    color:#e0e0e0;
    white-space:pre-wrap;
    word-wrap:break-word;
  }

  .complaint-text.truncated{
    max-height:300px;
    overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, black 60%, transparent 100%);
    mask-image:linear-gradient(to bottom, black 60%, transparent 100%);
  }

  .show-more{
    background:none;
    border:none;
    color:#4a9eff;
    font-size:14px;
    cursor:pointer;
    padding:8px 0 0;
    font-family:inherit;
  }

  .source{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid #2a2a2a;
    font-size:12px;
    color:#555;
    display:flex;
    align-items:center;
    gap:6px;
  }

  .ai-dot{
    display:inline-block;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#4a9eff;
    animation:pulse 2s infinite;
  }

  @keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.3}
  }

  .actions{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:480px;
    width:100%;
  }

  .btn-main{
    background:#2563eb;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:16px;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    transition:.2s;
    text-align:center;
    text-decoration:none;
    display:block;
  }
  .btn-main:active{transform:scale(.97)}

  .btn-share{
    background:#1a1a1a;
    color:#fff;
    border:1px solid #333;
    border-radius:12px;
    padding:14px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    transition:.2s;
  }
  .btn-share:active{transform:scale(.97)}

  .footer{
    margin-top:32px;
    font-size:11px;
    color:#444;
    text-align:center;
  }

  .toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:#333;
    color:#fff;
    padding:10px 20px;
    border-radius:20px;
    font-size:13px;
    opacity:0;
    transition:.3s;
    pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .error{
    text-align:center;
    padding:40px 20px;
    color:#666;
  }
  .error h2{font-size:18px;margin-bottom:8px;color:#888}
</style>
</head>
<body>

<div class="badge">✨ Текст сгенерирован ИИ</div>
<div class="headline" id="headline">ИИ написал жалобу на УО</div>
<div class="subline" id="subline">г. Химки, ул. Совхозная, д. 5</div>

<div class="card" id="card">
  <div class="quote-mark">"</div>
  <div class="complaint-text truncated" id="complaint-text">Загрузка...</div>
  <button class="show-more" id="show-more" onclick="showFull()" style="display:none">Читать полностью ↓</button>
  <div class="source">
    <span class="ai-dot"></span>
    Сгенерировано нейросетью · Жалоба на УО
  </div>
</div>

<div class="actions">
  <a class="btn-main" href="https://catch-the-wave.github.io/KhimkiManagement/" id="cta-btn">
    😂 Сгенерировать свою жалобу
  </a>
  <button class="btn-share" onclick="shareThis()">
    🔗 Поделиться этим шедевром
  </button>
</div>

<div class="footer">
  Дом на Совхозной vs УО «Континент Комфорта» · 2026
</div>

<div class="toast" id="toast"></div>

<script>
const APP_URL = 'https://catch-the-wave.github.io/KhimkiManagement/';

function getText() {
  try {
    const hash = window.location.hash.slice(1);
    if (!hash) return null;
    return decodeURIComponent(atob(hash));
  } catch(e) {
    return null;
  }
}

function init() {
  const text = getText();
  const ct = document.getElementById('complaint-text');
  const sm = document.getElementById('show-more');

  if (!text) {
    ct.textContent = 'Жалоба не найдена. Возможно, ссылка устарела.';
    ct.classList.remove('truncated');
    document.getElementById('headline').textContent = 'Упс';
    return;
  }

  ct.textContent = text;

  // Show "read more" only if text is long
  if (text.length > 400) {
    ct.classList.add('truncated');
    sm.style.display = 'block';
  } else {
    ct.classList.remove('truncated');
  }

  // Update meta for sharing (best effort)
  document.title = 'ИИ написал жалобу на УО 😂';
}

function showFull() {
  const ct = document.getElementById('complaint-text');
  const sm = document.getElementById('show-more');
  ct.classList.remove('truncated');
  sm.style.display = 'none';
}

function shareThis() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({
      title: 'ИИ написал жалобу на УО 😂',
      text: 'Смотри что нейросеть написала вместо жильца:',
      url: url
    }).catch(() => {});
  } else {
    // Fallback: copy link
    const x = document.createElement('textarea');
    x.value = url;
    x.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(x);
    x.select();
    document.execCommand('copy');
    document.body.removeChild(x);
    toast('✅ Ссылка скопирована!');
  }
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
